spark.master                              local[*]
spark.sql.extensions                      io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.spark_catalog           org.apache.spark.sql.delta.catalog.DeltaCatalog
spark.sql.catalog.unity                   io.unitycatalog.spark.UCSingleCatalog
spark.sql.catalog.unity.uri               http://unitycatalog:8080
spark.sql.catalog.unity.token             dummy-token
spark.sql.defaultCatalog                  unity
spark.sql.hive.metastore.sharedPrefixes   com.mysql.jdbc,com.mysql.cj,org.postgresql,com.microsoft.sqlserver,oracle.jdbc,software.amazon.awssdk.,org.apache.hadoop.fs.s3a.,io.unitycatalog.spark.,io.unitycatalog.client.
spark.jars.ivy                            /tmp/.ivy2
spark.hadoop.fs.s3a.classloader.isolation false
spark.sql.repl.eagerEval.enabled          true

# S3 / MinIO Configuration
spark.hadoop.fs.s3a.endpoint              http://minio:9000
spark.hadoop.fs.s3a.access.key            admin
spark.hadoop.fs.s3a.secret.key            password
spark.hadoop.fs.s3a.path.style.access     true
spark.hadoop.fs.s3a.connection.ssl.enabled false
spark.hadoop.fs.s3a.impl                  org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
spark.hadoop.fs.s3a.connection.maximum    100

# Mapping s3:// to s3a internally since Unity Catalog prefers s3:// scheme
spark.hadoop.fs.s3.impl                   org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3.endpoint               http://minio:9000
spark.hadoop.fs.s3.access.key             admin
spark.hadoop.fs.s3.secret.key             password
spark.hadoop.fs.s3.path.style.access      true
spark.hadoop.fs.s3.connection.ssl.enabled false
spark.hadoop.fs.s3.aws.credentials.provider org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
