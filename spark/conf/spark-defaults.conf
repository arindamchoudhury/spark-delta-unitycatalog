spark.master                              local[*]
spark.sql.extensions                      io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.spark_catalog           org.apache.spark.sql.delta.catalog.DeltaCatalog
spark.sql.catalog.unity                   io.unitycatalog.spark.UCSingleCatalog
spark.sql.catalog.unity.uri               http://unitycatalog:8080
spark.sql.catalog.unity.token
spark.sql.defaultCatalog                  unity
spark.jars.packages                       io.delta:delta-spark_2.13:4.1.0,io.unitycatalog:unitycatalog-spark_2.13:0.4.0,org.apache.hadoop:hadoop-aws:3.4.3
spark.jars.ivy                            /tmp/.ivy2
spark.sql.repl.eagerEval.enabled          true

# S3 / MinIO Configuration
spark.hadoop.fs.s3a.endpoint              http://minio:9000
spark.hadoop.fs.s3a.access.key            admin
spark.hadoop.fs.s3a.secret.key            password
spark.hadoop.fs.s3a.path.style.access     true
spark.hadoop.fs.s3a.connection.ssl.enabled false
spark.hadoop.fs.s3a.impl                  org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
