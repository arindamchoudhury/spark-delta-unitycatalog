services:
  unitycatalog:
    image: unitycatalog/unitycatalog:v0.4.0
    container_name: unitycatalog
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/api/2.1/unity-catalog/catalogs || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./metadata/uc:/tmp/uc
      - ./uc-server.properties:/home/unitycatalog/etc/conf/server.properties
    networks:
      default:
        aliases:
          - server

  ui:
    image: unitycatalog/unitycatalog-ui:main
    container_name: unitycatalog-ui
    ports:
      - "3000:3000"
    depends_on:
      unitycatalog:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes:
      - ./metadata/minio:/data
    networks:
      default:
        aliases:
          - s3

  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 admin password;
      mc mb myminio/warehouse;
      exit 0;
      "

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster_password
      POSTGRES_DB: dagster
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster -d dagster"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./metadata/postgres:/var/lib/postgresql/data
    networks:
      default:
        aliases:
          - db

  spark:
    build:
      context: .
      dockerfile: spark/Dockerfile
    image: spark-delta-unitycatalog/spark:4.1.1
    container_name: spark
    user: "0:0"
    depends_on:
      unitycatalog:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["bash", "-lc", "/opt/spark/sbin/start-connect-server.sh && sleep infinity"]
    ports:
      - "4040:4040"
      - "4041:4041"
      - "4042:4042"
      - "15002:15002"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.connect(('127.0.0.1', 15002)); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./metadata/uc:/tmp/uc
      - ./metadata/ivy:/tmp/.ivy2
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./scripts:/opt/spark/scripts:ro
      - ./workspace:/workspace

  dagster:
    image: spark-delta-unitycatalog/spark:4.1.1
    container_name: dagster
    user: "0:0"
    depends_on:
      spark:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["dagster", "dev", "-h", "0.0.0.0", "-p", "3001", "-w", "/workspace/dagster/workspace.yaml"]
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.connect(('127.0.0.1', 3001)); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - DAGSTER_HOME=/workspace/dagster
    volumes:
      - ./metadata/uc:/tmp/uc
      - ./metadata/ivy:/tmp/.ivy2
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./scripts:/opt/spark/scripts:ro
      - ./workspace:/workspace
